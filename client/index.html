<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Masa – Premium Furniture for Modern Living</title>
    <meta name="description" content="Shop Masa's curated collection of premium furniture — chairs, sofas, beds, tables and lamps. Free shipping on orders over $500. Browse 40+ products with secure Stripe checkout." />

    <link rel="canonical" href="https://masa-furniture.onrender.com/" />

    <!-- Open Graph (Facebook / LinkedIn) -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://masa-furniture.onrender.com/" />
    <meta property="og:title"       content="Masa – Premium Furniture for Modern Living" />
    <meta property="og:description" content="Shop Masa's curated collection of premium furniture — chairs, sofas, beds, tables and lamps. Secure Stripe checkout, 40+ products." />
    <meta property="og:image"       content="https://masa-furniture.onrender.com/home.webp" />
    <meta property="og:site_name"   content="Masa Furniture" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Masa – Premium Furniture for Modern Living" />
    <meta name="twitter:description" content="Shop Masa's curated collection of premium furniture — chairs, sofas, beds, tables and lamps." />
    <meta name="twitter:image"       content="https://masa-furniture.onrender.com/home.webp" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "OnlineStore",
      "name": "Masa Furniture",
      "url": "https://masa-furniture.onrender.com",
      "description": "Premium online furniture store offering chairs, sofas, beds, tables and lamps with secure Stripe payment processing.",
      "image": "https://masa-furniture.onrender.com/home.webp",
      "priceRange": "$$",
      "currenciesAccepted": "USD",
      "paymentAccepted": "Credit Card",
      "sameAs": [
        "https://github.com/frankkode/Masa-Furniture"
      ]
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>
